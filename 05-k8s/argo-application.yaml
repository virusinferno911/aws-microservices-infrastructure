apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: devops-portfolio-gitops
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/virusinferno911/aws-microservices-infrastructure.git'
    targetRevision: HEAD
    path: 05-k8s
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true