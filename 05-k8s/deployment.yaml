apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-portfolio-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: portfolio
  template:
    metadata:
      labels:
        app: portfolio
    spec:
      containers:
      - name: web-app
        image: 297155701247.dkr.ecr.us-east-1.amazonaws.com/devops-production-app:latest
        ports:
        - containerPort: 80
        imagePullPolicy: Always